name: Compilar RemesaPro (Windows + macOS)

on:
  push:
    branches: [ main ]
    paths:
      - 'process_remesa.py'
      - 'RemesaPro.spec'
      - '.github/workflows/build-exe.yml'
  workflow_dispatch:   # Permite lanzarlo manualmente desde GitHub

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Inyectar versión (build number)
        shell: bash
        run: |
          sed -i "s/^APP_VERSION = .*/APP_VERSION = ${{ github.run_number }}/" process_remesa.py

      - name: Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pandas pypdf openpyxl

      - name: Compilar .exe con PyInstaller
        run: |
          pyinstaller RemesaPro.spec

      - name: Subir .exe como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: RemesaPro-Windows
          path: dist/RemesaPro.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Inyectar versión (build number)
        run: |
          sed -i '' "s/^APP_VERSION = .*/APP_VERSION = ${{ github.run_number }}/" process_remesa.py

      - name: Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pandas pypdf openpyxl

      - name: Compilar .app con PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --add-data "ciee logo.png:." \
            --name RemesaPro \
            process_remesa.py

      - name: Crear .zip de la app
        run: |
          cd dist
          zip -r RemesaPro-macOS.zip RemesaPro.app || zip RemesaPro-macOS.zip RemesaPro

      - name: Subir como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: RemesaPro-macOS
          path: dist/RemesaPro-macOS.zip
          retention-days: 30

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Descargar artefacto Windows
        uses: actions/download-artifact@v4
        with:
          name: RemesaPro-Windows
          path: artifacts/

      - name: Descargar artefacto macOS
        uses: actions/download-artifact@v4
        with:
          name: RemesaPro-macOS
          path: artifacts/

      - name: Crear Release automático
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "RemesaPro v${{ github.run_number }}"
          body: |
            Compilación automática desde commit `${{ github.sha }}`

            **Cambios:** ${{ github.event.head_commit.message }}

            **Descargas:**
            - `RemesaPro.exe` — Windows
            - `RemesaPro-macOS.zip` — macOS (descomprimir y ejecutar)
          files: |
            artifacts/RemesaPro.exe
            artifacts/RemesaPro-macOS.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
